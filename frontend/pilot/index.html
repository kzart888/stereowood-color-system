<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEREOWOOD Pilot Explorer</title>
  <link rel="stylesheet" href="./pilot.css">
</head>
<body>
  <main id="pilot-app" class="pilot-app">
    <header class="pilot-header">
      <h1>A7 Pilot: Color Dictionary Read-Only Explorer</h1>
      <p>该页面仅用于现代化迁移试点验证，不替代 legacy 生产 UI。</p>
    </header>

    <section class="pilot-card">
      <h2>运行状态</h2>
      <ul id="runtime-status" class="kv-list"></ul>
    </section>

    <section class="pilot-card">
      <h2>接口统计</h2>
      <ul id="endpoint-summary" class="kv-list"></ul>
    </section>

    <section class="pilot-card">
      <h2>样本数据（前 5 条）</h2>
      <div id="sample-panels" class="sample-panels"></div>
    </section>
  </main>

  <script src="./pilot.js"></script>
</body>
</html>
