<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - STEREOWOOD 颜色管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.3.14/index.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.3.14/index.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #22324a;
    }

    .page {
      max-width: 1240px;
      margin: 16px auto;
      padding: 0 12px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: #64748b;
    }

    .card {
      background: #fff;
      border: 1px solid #d9e2ee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 5px 14px rgba(15, 40, 73, 0.06);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .muted {
      color: #64748b;
      font-size: 12px;
    }

    .pending-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px dashed #e2e8f0;
    }

    .pending-row:last-child {
      border-bottom: none;
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .action-wrap {
      display: inline-flex;
      align-items: center;
    }

    .action-group {
      align-items: center;
    }

    .action-wrap .el-button,
    .toolbar .el-button {
      margin-left: 0 !important;
    }
  </style>
</head>
<body>
  <div id="account-app" class="page">
    <div class="header">
      <div>
        <h1 class="title">账号管理</h1>
        <p class="subtitle">当前登录：{{ me.username }}（{{ roleLabel(me.role) }}）</p>
      </div>
      <div style="display:flex; gap:8px;">
        <el-button @click="goApp">返回系统</el-button>
        <el-button type="danger" plain @click="logout">退出登录</el-button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <el-input
          v-model.trim="newUser.username"
          placeholder="输入新账号用户名（3-40位）"
          style="width:260px;"
          @keyup.enter="createUser"
        ></el-input>
        <el-button type="primary" @click="createUser">创建账号</el-button>
        <span class="muted">新账号默认密码为 123456，首次登录必须修改密码。</span>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">待审批申请</h3>
      <div v-if="pending.length===0" class="muted">暂无待审批申请</div>
      <div v-for="item in pending" :key="'pending-'+item.id" class="pending-row">
        <div>#{{ item.id }} {{ item.username }}（{{ roleLabel(item.role) }}）</div>
        <div style="display:flex; gap:8px;">
          <el-button size="small" type="success" @click="approve(item.id)">批准</el-button>
          <el-button size="small" type="danger" plain @click="reject(item.id)">拒绝</el-button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar-row">
        <div class="toolbar">
          <el-input v-model.trim="search" placeholder="搜索用户名" style="width:240px;" ></el-input>
          <el-select v-model="status" style="width:140px;">
            <el-option label="全部状态" value="all" ></el-option>
            <el-option label="approved" value="approved" ></el-option>
            <el-option label="pending" value="pending" ></el-option>
            <el-option label="disabled" value="disabled" ></el-option>
          </el-select>
          <el-button @click="loadAccounts">查询</el-button>
          <el-button type="warning" @click="batchReset">重置已选密码</el-button>
        </div>
        <span class="muted">已选 {{ selectedRows.length }} 项</span>
      </div>

      <el-table :data="accounts" @selection-change="onSelectionChange" border size="small" style="width:100%;">
        <el-table-column type="selection" width="44" :selectable="isRowSelectable" ></el-table-column>
        <el-table-column label="ID" prop="id" width="68" ></el-table-column>
        <el-table-column label="用户名" prop="username" min-width="140" ></el-table-column>
        <el-table-column label="身份" min-width="120">
          <template #default="scope">
            <el-tag size="small" :type="roleTagType(scope.row.role)">{{ roleLabel(scope.row.role) }}</el-tag>
          </template>
        </el-table-column>
        <el-table-column label="状态" min-width="110">
          <template #default="scope">
            <el-tag size="small" :type="statusTagType(scope.row.status)">{{ scope.row.status }}</el-tag>
          </template>
        </el-table-column>
        <el-table-column label="首登改密" min-width="100">
          <template #default="scope">
            <span>{{ scope.row.must_change_password ? '是' : '否' }}</span>
          </template>
        </el-table-column>
        <el-table-column label="操作" min-width="430">
          <template #default="scope">
            <div class="action-group">
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_reset')">
                <el-button size="small" :disabled="!allow(scope.row, 'can_reset')" @click="resetOne(scope.row)">重置密码</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_revoke')">
                <el-button size="small" :disabled="!allow(scope.row, 'can_revoke')" @click="revoke(scope.row)">踢下线</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_disable')">
                <el-button
                  v-if="scope.row.status!=='disabled'"
                  size="small"
                  type="warning"
                  plain
                  :disabled="!allow(scope.row, 'can_disable')"
                  @click="disable(scope.row)"
                >禁用</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_enable')">
                <el-button
                  v-if="scope.row.status==='disabled'"
                  size="small"
                  type="success"
                  plain
                  :disabled="!allow(scope.row, 'can_enable')"
                  @click="enable(scope.row)"
                >启用</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_delete')">
                <el-button size="small" type="danger" plain :disabled="!allow(scope.row, 'can_delete')" @click="remove(scope.row)">删除</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_promote')">
                <el-button
                  v-if="scope.row.role==='user'"
                  size="small"
                  type="primary"
                  plain
                  :disabled="!allow(scope.row, 'can_promote')"
                  @click="promote(scope.row)"
                >指派管理员</el-button>
              </span>
              <span class="action-wrap" :title="actionBlockedReason(scope.row, 'can_demote')">
                <el-button
                  v-if="scope.row.role==='admin'"
                  size="small"
                  plain
                  :disabled="!allow(scope.row, 'can_demote')"
                  @click="demote(scope.row)"
                >撤销管理员</el-button>
              </span>
            </div>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>

  <script src="js/account-management.js"></script>
</body>
</html>
