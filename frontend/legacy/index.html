<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEREOWOOD 颜色管理系统 - 登录</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #65758b;
      --primary: #0b6bcb;
      --danger: #c23333;
      --border: #d5dde7;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: radial-gradient(circle at top, #eaf2fb 0%, var(--bg) 50%, #eef1f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .login-card {
      width: min(420px, calc(100vw - 24px));
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(18, 47, 82, 0.12);
      padding: 24px 22px;
    }
    .title {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }
    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .row {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text);
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11, 107, 203, 0.12);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary {
      flex: 1;
      background: var(--primary);
      color: #fff;
    }
    .btn-secondary {
      background: #eef3f9;
      color: #27496d;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .error {
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
    }
    .success {
      margin-top: 10px;
      color: #14833b;
      font-size: 13px;
      min-height: 18px;
    }
    .block {
      border-top: 1px dashed var(--border);
      margin-top: 16px;
      padding-top: 14px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="title">STEREOWOOD 颜色管理系统</h1>
    <p class="subtitle">请输入账号和密码登录</p>

    <section id="login-section">
      <div class="row">
        <label for="username">用户名</label>
        <input id="username" autocomplete="username" />
      </div>
      <div class="row">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <div class="actions">
        <button id="login-btn" class="btn-primary">登录</button>
        <button id="toggle-register-btn" class="btn-secondary" type="button">申请账号</button>
      </div>
      <div class="hint">一个月内免重复登录；到期后需重新登录。</div>
      <div id="login-error" class="error"></div>
      <div id="login-success" class="success"></div>
    </section>

    <section id="change-password-section" class="hidden block">
      <h3 style="margin:0 0 8px; font-size:16px;">首次登录需修改密码</h3>
      <div class="row">
        <label for="current-password">当前密码</label>
        <input id="current-password" type="password" autocomplete="current-password" />
      </div>
      <div class="row">
        <label for="new-password">新密码（至少8位）</label>
        <input id="new-password" type="password" autocomplete="new-password" />
      </div>
      <div class="row">
        <label for="confirm-password">确认新密码</label>
        <input id="confirm-password" type="password" autocomplete="new-password" />
      </div>
      <div class="actions">
        <button id="change-password-btn" class="btn-primary">确认修改</button>
      </div>
      <div id="change-password-error" class="error"></div>
      <div id="change-password-success" class="success"></div>
    </section>

    <section id="register-section" class="hidden block">
      <h3 style="margin:0 0 8px; font-size:16px;">账号申请</h3>
      <div class="row">
        <label for="register-username">申请用户名</label>
        <input id="register-username" autocomplete="username" />
      </div>
      <div class="row">
        <label for="register-password">初始密码（至少8位）</label>
        <input id="register-password" type="password" autocomplete="new-password" />
      </div>
      <div class="actions">
        <button id="register-btn" class="btn-primary">提交申请</button>
      </div>
      <div id="register-error" class="error"></div>
      <div id="register-success" class="success"></div>
    </section>
  </div>

  <script src="js/login-page.js"></script>
</body>
</html>
